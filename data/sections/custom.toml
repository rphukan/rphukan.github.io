text  = "After 20 years in the trenches of software development, I’ve realized that the most important skill isn't knowing everything—it’s never stopping the search for what's next. This blog is a living record of my ongoing journey through the ever-shifting landscape of technology. Here, I translate decades of experience into fresh insights as I explore new frameworks, architectural patterns, and engineering challenges. Join me as I document the lessons learned, the bugs crushed, and the constant evolution of a developer's craft."
quote = "\"Anyone who stops learning is old, whether at twenty or eighty. Anyone who keeps learning stays young. The greatest thing in life is to keep your mind young.\" — Henry Ford"
